version: "3.9"

services:

  # ---------------- POSTGRES (PGVECTOR FIXED) ----------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: support-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER} -d ${PGDATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - support_network


  # ---------------- CHROMA ----------------
  chroma:
    image: chromadb/chroma:0.5.23
    container_name: support-chroma
    restart: unless-stopped

    environment:
      IS_PERSISTENT: TRUE

    volumes:
      - chroma_data:/chroma/chroma

    ports:
      - "8000:8000"

    networks:
      - support_network


  # ---------------- N8N ----------------
  n8n:
    image: n8nio/n8n:latest
    container_name: support-n8n
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${PGDATABASE}
      DB_POSTGRESDB_USER: ${PGUSER}
      DB_POSTGRESDB_PASSWORD: ${PGPASSWORD}

      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http

      N8N_WEBHOOK_BASE_URL: http://localhost:5678

      NODE_ENV: production
      WEBHOOK_URL: ${WEBHOOK_URL}

      OPENAI_API_KEY: ${OPENAI_API_KEY}

    volumes:
      - n8n_data:/home/node/.n8n

    ports:
      - "5678:5678"

    networks:
      - support_network


  # ---------------- APP ----------------
  app:
    build: .
    container_name: nolix-project-1
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started

    environment:
      PORT: ${PORT}

      PGHOST: postgres
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL}

      N8N_HOST: n8n

    ports:
      - "3005:3000"

    networks:
      - support_network


# ---------------- NETWORK ----------------
networks:
  support_network:
    driver: bridge


# ---------------- VOLUMES ----------------
volumes:
  postgres_data:
  chroma_data:
  n8n_data: