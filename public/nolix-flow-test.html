<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nolix Strict Revenue Flow Test</title>
  <style>
    body { font-family: system-ui; background: #0b0b0b; color: #eee; max-width: 900px; margin: 40px auto; line-height: 1.5; }
    h1 { border-bottom: 1px solid #333; padding-bottom: 10px; }
    .config { background: #1a1a1a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
    .config input { background: #000; color: #fff; border: 1px solid #444; padding: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
    .config label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; }
    button { background: #fff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }
    button:hover { background: #ccc; }
    button:disabled { background: #444; color: #888; cursor: not-allowed; }
    .step { background: #111; border: 1px solid #222; border-left: 4px solid #444; padding: 15px; margin-bottom: 10px; border-radius: 4px; }
    .step h3 { margin: 0 0 10px 0; font-size: 16px; display: flex; justify-content: space-between; }
    .status { font-size: 14px; padding: 3px 8px; border-radius: 12px; font-weight: bold; }
    .status.pending { background: #444; color: #fff; }
    .status.pass { background: #053305; color: #4f4; border: 1px solid #080; }
    .status.fail { background: #330505; color: #f44; border: 1px solid #800; }
    .status.skip { background: #333; color: #aaa; border: 1px solid #555; }
    pre { background: #000; padding: 10px; border-radius: 4px; font-size: 12px; overflow-x: auto; color: #0f0; border: 1px solid #222; white-space: pre-wrap; }
    .summary { font-size: 18px; margin-top: 20px; padding: 20px; background: #111; border: 1px dashed #555; text-align: center; }
    .warning { color: #f44; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>

  <h1>Nolix Strict Revenue Flow Test</h1>
  <p style="color: #aaa;">هذا الاختبار لا يفترض نجاح أي شيء. سيقوم بالتحقق الفعلي من تركيب السكربت، وقاعدة البيانات، وStripe، قبل أن يعتبر النظام ناجحاً.</p>

  <div class="config">
    <label>Test Store Domain (e.g., https://your-store.myshopify.com)</label>
    <input type="url" id="storeUrl" value="https://test-store.myshopify.com">
    <button id="runBtn" onclick="runTests()">▶ Run Strict Test</button>
  </div>

  <div id="steps"></div>
  <div id="summary" class="summary" style="display: none;"></div>

  <script>
    const API_BASE = "http://localhost:3002";
    let SESSION_ID = "sid_test_" + Math.random().toString(36).substring(2, 10);
    
    // The 8 strict sprints
    const Sprints = [
      { id: "s1", name: "Sprint 1 — Script Installation", fn: checkScript },
      { id: "s2", name: "Sprint 2 — page_view -> DB Persistence", fn: sendPageView },
      { id: "s3", name: "Sprint 3 — exit_intent -> Decision Engine", fn: sendExitIntent },
      { id: "s4", name: "Sprint 4 — conversion -> Attribution", fn: sendConversion },
      { id: "s6", name: "Sprint 6 — Stripe Usage Sync", fn: checkStripeUsage },
      { id: "s7", name: "Sprint 7 — Stripe Invoice Generation", fn: checkInvoices },
      { id: "s8", name: "Sprint 8 — Checkout Portal Generation", fn: checkCheckout }
    ];

    function logStep(id, name) {
      const div = document.createElement("div");
      div.className = "step";
      div.id = id;
      div.innerHTML = `
        <h3><span>${name}</span> <span class="status pending" id="status-${id}">Running...</span></h3>
        <pre id="out-${id}">Waiting...</pre>
      `;
      document.getElementById("steps").appendChild(div);
    }

    function updateStep(id, status, output) {
      const statusEl = document.getElementById(`status-${id}`);
      statusEl.className = `status ${status}`;
      statusEl.innerText = status.toUpperCase();
      document.getElementById(`out-${id}`).innerText = typeof output === 'object' ? JSON.stringify(output, null, 2) : output;
    }

    async function safeFetch(url, options = {}) {
      try {
        const res = await fetch(url, options);
        let data;
        const text = await res.text();
        try { data = JSON.parse(text); } catch(e) { data = { raw: text }; }
        return { ok: res.ok, status: res.status, data };
      } catch (err) {
        return { ok: false, status: 0, data: { error: err.message } };
      }
    }

    // --- Sprint Functions --- //

    async function checkScript(domain) {
      // Calls the backend truth API to actually fetch the domain HTML and verify the script is there
      const res = await safeFetch(`${API_BASE}/api/diagnostics/truth?store=${encodeURIComponent(domain)}`);
      if (!res.ok) throw new Error(res.data.error || "Failed to check script");
      
      const report = res.data.report.script;
      if (report.status === "fail") {
        throw new Error("حرفياً أنت لم تضع السكريبت أساساً في المتجر. هذا المتجر غير متصل.");
      }
      return { msg: "السكربت مركب فعلياً على المتجر وتم التحقق منه", details: report.message };
    }

    async function sendPageView(domain) {
      const urlObj = new URL(domain.startsWith("http") ? domain : `https://${domain}`);
      const rawDomain = urlObj.hostname;

      const res = await safeFetch(`${API_BASE}/api/track`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-store-domain": rawDomain },
        body: JSON.stringify({
          event: "page_view",
          session_id: SESSION_ID,
          store: rawDomain,
          data: { time_on_page: 5 }
        })
      });

      if (!res.ok) throw new Error(JSON.stringify(res.data));
      
      // If DB failed, the API currently returns 200 but logs a DB error.
      // We will check the diagnostic API to verify DB connectivity.
      const dbCheck = await safeFetch(`${API_BASE}/api/diagnostics/truth?store=${encodeURIComponent(domain)}`);
      if (dbCheck.data.report.database.status === "fail") {
        throw new Error("الحدث وصل لـ API ولكنه ضاع! قاعدة البيانات مفصولة ولا تقوم بالحفظ.");
      }

      return res.data;
    }

    async function sendExitIntent(domain) {
      const rawDomain = new URL(domain.startsWith("http") ? domain : `https://${domain}`).hostname;
      const res = await safeFetch(`${API_BASE}/api/track`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-store-domain": rawDomain },
        body: JSON.stringify({
          event: "exit_intent",
          session_id: SESSION_ID,
          store: rawDomain,
          data: { exit_intent: true, hesitation_score: 0.9, cart_value: 100 }
        })
      });

      if (!res.ok) throw new Error(JSON.stringify(res.data));
      if (!res.data.decision) throw new Error("لم يقم النظام باتخاذ قرار بشأن الـ Popup.");
      
      return res.data;
    }

    async function sendConversion(domain) {
      const rawDomain = new URL(domain.startsWith("http") ? domain : `https://${domain}`).hostname;
      const res = await safeFetch(`${API_BASE}/api/track`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-store-domain": rawDomain },
        body: JSON.stringify({
          event: "conversion",
          session_id: SESSION_ID,
          store: rawDomain,
          data: { order_id: "TEST-" + Date.now(), order_value: 100, ai_influenced: true }
        })
      });

      if (!res.ok) throw new Error(JSON.stringify(res.data));
      return res.data;
    }

    async function checkStripeUsage(domain) {
      const rawDomain = new URL(domain.startsWith("http") ? domain : `https://${domain}`).hostname;
      
      // First, check if Stripe keys are even in .env using the Truth Engine
      const truth = await safeFetch(`${API_BASE}/api/diagnostics/truth?store=${encodeURIComponent(domain)}`);
      if (truth.data.report.billing.status === "fail") {
        throw new Error("Stripe مفصول. أنت لم تضع مفاتيح Stripe في النظام لذلك لن يتم إرسال أي Usage.");
      }

      // Then attempt the actual call
      const res = await safeFetch(`${API_BASE}/api/billing/usage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ store_domain: rawDomain, conversions: 1, revenue_attributed: 100 })
      });

      if (!res.ok) throw new Error(JSON.stringify(res.data));
      if (res.data.status === "skipped") throw new Error("النظام تخطى Stripe. تأكد من إعدادات الفوترة.");
      
      return res.data;
    }

    async function checkInvoices(domain) {
      const rawDomain = new URL(domain.startsWith("http") ? domain : `https://${domain}`).hostname;
      const res = await safeFetch(`${API_BASE}/api/billing/invoices?store=${rawDomain}`);
      if (!res.ok) throw new Error(JSON.stringify(res.data));
      if (res.data.status === "stripe_not_configured") throw new Error("مفاتيح Stripe غير موجودة. لا يمكن جلب الفواتير.");
      return res.data;
    }

    async function checkCheckout(domain) {
      const rawDomain = new URL(domain.startsWith("http") ? domain : `https://${domain}`).hostname;
      const res = await safeFetch(`${API_BASE}/api/billing/create-checkout`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ store_domain: rawDomain, plan: "growth" })
      });
      if (!res.ok) throw new Error(JSON.stringify(res.data));
      if (res.data.error && res.data.error.includes("Stripe")) throw new Error(res.data.error);
      return res.data;
    }

    // --- Test Runner --- //

    async function runTests() {
      const btn = document.getElementById("runBtn");
      const storeInput = document.getElementById("storeUrl").value;
      const stepsDiv = document.getElementById("steps");
      const summaryDiv = document.getElementById("summary");
      
      if (!storeInput) return alert("أدخل رابط المتجر أولاً!");
      
      btn.disabled = true;
      stepsDiv.innerHTML = "";
      summaryDiv.style.display = "none";
      SESSION_ID = "sid_test_" + Math.random().toString(36).substring(2, 10);
      
      let passed = 0;
      let stopExecution = false;

      for (let i = 0; i < Sprints.length; i++) {
        const sprint = Sprints[i];
        logStep(sprint.id, sprint.name);
        
        if (stopExecution) {
          updateStep(sprint.id, "skip", "تم التخطي بسبب فشل خطوة أساسية سابقة.");
          continue;
        }

        try {
          const result = await sprint.fn(storeInput);
          updateStep(sprint.id, "pass", result);
          passed++;
        } catch (err) {
          updateStep(sprint.id, "fail", err.message);
          // If Script fails or DB fails or Stripe fails, it heavily impacts subsequent steps
          stopExecution = true; 
        }
      }

      summaryDiv.style.display = "block";
      summaryDiv.innerHTML = `
        <strong>الأنظمة التي تحققت فعلياً: ${passed} من ${Sprints.length}</strong><br>
        ${passed === Sprints.length 
          ? `<span style="color:#0f0">تهانينا! النظام الكامل يعمل من المتجر وحتى فوترة Stripe حقيقياً.</span>` 
          : `<div class="warning">النظام توقف عن التحقق! يجب إصلاح الخطأ الأخير لتتمكن من إكمال السلسلة. لا يمكننا إرسال نتائج عشوائية.</div>`
        }
      `;
      btn.disabled = false;
    }
  </script>
</body>
</html>
